name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Electron packaging dependencies with npm
        working-directory: electron
        run: npm install

      - name: Build desktop artifacts
        working-directory: electron
        run: npm run build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autuber-linux
          path: electron/release/*
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Electron packaging dependencies with npm
        working-directory: electron
        run: npm install

      - name: Build desktop artifacts
        working-directory: electron
        run: npm run build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autuber-windows
          path: electron/release/*
          if-no-files-found: error

  publish:
    needs:
      - build-linux
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate release notes from commits
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          previous_tag="$(git tag --sort=-creatordate | grep -Fxv "${RELEASE_TAG}" | head -n 1 || true)"

          {
            printf '## Highlights\n\n'

            if [ -n "${previous_tag}" ]; then
              printf 'Changes since `%s`.\n\n' "${previous_tag}"
              git log "${previous_tag}..${RELEASE_SHA}" --reverse --no-merges --pretty=format:'- %s (%h)'
            else
              printf 'Initial tagged release.\n\n'
              git log "${RELEASE_SHA}" --reverse --no-merges --pretty=format:'- %s (%h)'
            fi
          } > RELEASE_NOTES.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          body_path: RELEASE_NOTES.md
          files: release-artifacts/*
